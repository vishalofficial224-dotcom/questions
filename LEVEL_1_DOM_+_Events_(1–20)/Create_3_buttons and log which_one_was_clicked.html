<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create 3 buttons and log which one was clicked</title>
</head>
<body>
    <button id="first-button">button-1</button>
    <button id="second-button">button-2</button>
    <button id="third-button">button-3</button>

    <script>
        const first_button = document.getElementById("first-button");
        const second_button = document.getElementById("second-button");
        const third_button = document.getElementById("third-button");

        function handler(e) {
            console.log(e.target.id)
        }

        first_button.addEventListener("click", handler);
        second_button.addEventListener("click", handler);
        third_button.addEventListener("click", handler);
