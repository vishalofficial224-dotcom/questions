<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>create input log it's values</title>
</head>
<body>
    <button id="inp">clicked</button>

    <script>
        const inp = document.getElementById('inp');
        let number = 0;
        inp.addEventListener("click", (e) => {
            number = number + 1;
            console.log("clicked", number)
        })

    </script>
    
</body>
</html>
