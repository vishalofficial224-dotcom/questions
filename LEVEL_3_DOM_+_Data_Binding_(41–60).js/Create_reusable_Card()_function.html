<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create reusable Card() function</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: .25rem;
            margin: 1rem;
        }

        .box {
            height: 200px;
            /* width: 300px; */
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <script>
        const body = document.querySelector('body');
        const bigCard = card("box", "card1")
        body.appendChild(bigCard)
        

        function card(cssClass, name, category) {
            const card = document.createElement('div');

            // data attribute (IMPORTANT for filtering later)
            card.setAttribute("data-category", category);
            card.className = cssClass;
            card.textContent = name;
            return card;

        }

        const a = () => {
            console.log("i am an annonymous!")
        }

        function x() {
            let count = 0;
            bigCard.addEventListener("click", function xyz() {
                console.log("big card has been clicked!")
                console.log(count);
                count++;
            })

        }

        x();
    </script>
</body>
</html>
