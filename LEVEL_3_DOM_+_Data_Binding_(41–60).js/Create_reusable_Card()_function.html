<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Render array of objects as cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: .25rem;
            margin: 1rem;
        }

        .box {
            height: 200px;
            /* width: 300px; */
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <script>
        const body = document.querySelector('body');

        body.appendChild(card("box", "card1 "))
        body.appendChild(card("box", "card2"))
        body.appendChild(card("box", "card3"))
        body.appendChild(card("box", "card4"))
        body.appendChild(card("box", "card5"))
        body.appendChild(card("box", "card6"))
        body.appendChild(card("box", "card7"))
        body.appendChild(card("box", "card8"))
        body.appendChild(card("box", "card9"))

        function card(cssClass, name) {
            const card = document.createElement('div');
            card.className = cssClass;
            card.textContent = name;
            return card;

        }

    </script>
</body>
</html>
