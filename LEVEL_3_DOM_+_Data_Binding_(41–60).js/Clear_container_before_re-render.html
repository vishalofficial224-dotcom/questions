<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clear container before re-render</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <input id="search" placeholder="Type to search..." />
    <div id="app"></div>
    <script>
      // let data = ["apple", "banana", "mango"];
      // const body = document.querySelector('body');
      // const h3 = document.createElement('h3');

      // const search = data.filter(x => x.includes('b'))
      // function render(content) {

      //     content.forEach(item => {
      //         h3.innerHTML = ''
      //         h3.innerHTML += item;
      //         body.appendChild(h3)
      //     })
      // }
      // render(data)
      // render(search)

      const data = ["apple", "banana", "mango", "grapes", "pineapple"];

      const app = document.getElementById("app");
      const search = document.getElementById("search");

      // 🧠 render function
      function render(list) {
        // 🧼 clear old UI
        // app.innerHTML = "";

        // 🎨 create new UI
        list.forEach((item) => {
          const div = document.createElement("div");
          div.textContent = item;
          app.appendChild(div);
        });
      }

      // 🔁 initial render
      render(data);

      // 🔍 re-render on typing
      search.addEventListener("input", (e) => {
        const value = e.target.value.toLowerCase();

        const filtered = data.filter((item) =>
          item.toLowerCase().includes(value),
        );

        // 🔥 THIS is why we call render again
        render(filtered);
      });
    </script>
  </body>
</html>
